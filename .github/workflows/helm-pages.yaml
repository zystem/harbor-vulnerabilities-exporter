name: Publish Helm chart

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - ".github/workflows/helm-pages.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Lint chart
        run: helm lint helm/harbor-vulnerabilities-exporter

      - name: Package chart
        run: |
          mkdir -p public
          helm package helm/harbor-vulnerabilities-exporter --destination public
          helm repo index public --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
