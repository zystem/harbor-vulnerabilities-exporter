name: CI and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  NIM_VERSION: "2.2.4"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ env.NIM_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev curl

      - name: Install Nim dependencies
        run: |
          nimble install -y \
            https://github.com/zystem/nim-yyjson \
            https://github.com/zystem/nim-promlite

      - name: Run tests
        run: sh tests/run.sh

      - name: Build binary
        run: sh build.sh

      - name: Prepare binary artifact
        run: |
          mkdir -p dist
          cp build/harbor-vulnerabilities-exporter dist/harbor-vulnerabilities-exporter-linux-amd64
          chmod +x dist/harbor-vulnerabilities-exporter-linux-amd64
          sha256sum dist/harbor-vulnerabilities-exporter-linux-amd64 > dist/harbor-vulnerabilities-exporter-linux-amd64.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: harbor-vulnerabilities-exporter-linux-amd64
          path: dist/*

  helm:
    name: Helm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/harbor-vulnerabilities-exporter

      - name: Render chart
        run: |
          helm template harbor-vulnerabilities-exporter helm/harbor-vulnerabilities-exporter \
            --namespace monitoring \
            --set env.HARBOR_API_URL=https://harbor.example

      - name: Package chart
        run: helm package helm/harbor-vulnerabilities-exporter --destination build/helm

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - test-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - test-build
      - helm
      - docker
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: harbor-vulnerabilities-exporter-linux-amd64
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
